name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint + import)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: requirements-locked.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-locked.txt
        pip install ruff mypy

    - name: Lint (ruff check)
      run: ruff check --output-format=github

    - name: Format check (ruff format)
      run: ruff format --check

    - name: Type check (mypy)
      run: mypy vlog_tool/ --exclude vlog_tool/ai/ 2>&1 || true
      # mypy is advisory only — non-zero exit doesn't fail the job

    - name: Import check
      run: python -c "import vlog_tool; print('import OK')"

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: requirements-locked.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-locked.txt
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        python -m pytest vlog_tool/tests/ --cov=vlog_tool --cov-branch --cov-report=term --cov-report=xml

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        fail_ci_if_error: false

  ui-test:
    name: UI tests (Vitest)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run UI tests
      run: npm test

  setup:
    name: Setup script validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install yaml for config validation
      run: pip install pyyaml

    - name: Check setup.sh syntax
      run: |
        if [ -f setup.sh ]; then
          bash -n setup.sh
          echo "setup.sh syntax OK"
        else
          echo "setup.sh not found -- skipping"
        fi

    - name: Validate config.example.yaml
      run: |
        python -c "import yaml; yaml.safe_load(open('config.example.yaml')); print('config.example.yaml: valid YAML')"

    - name: Check requirements files
      run: |
        echo "requirements.txt:"; wc -l requirements.txt
        echo "requirements-locked.txt:"; wc -l requirements-locked.txt

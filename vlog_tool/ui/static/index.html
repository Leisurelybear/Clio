<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Vlog 剪辑 UI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="proj">
    <span class="label">项目:</span>
    <span id="proj-name" class="value">加载中...</span>
  </div>
  <div class="source-toggle">
    <button data-source="compressed" class="active" title="浏览 output/compressed/ 下的 640p 压缩视频">压缩</button>
    <button data-source="original" title="浏览 input_dir 下的原始 4K 视频">原视频</button>
  </div>
  <div class="actions">
    <button id="btn-reload" title="重新扫描磁盘上的文件">重新加载</button>
    <span id="status" class="status"></span>
  </div>
</header>

<main>
  <aside id="sidebar">
    <h3>
      <span>项目</span>
      <span id="proj-name-sidebar" class="value" title="当前项目名">加载中...</span>
    </h3>
    <div id="project-actions" style="margin-bottom:8px;display:flex;gap:6px;">
      <button id="btn-open-project" class="sidebar-btn" title="打开已有项目">📂 打开项目</button>
      <button id="btn-new-project" class="sidebar-btn" title="新建项目">＋ 新建</button>
    </div>
    <ul id="project-list">
      <li class="project-item" data-entity="plan" title="打开规划 (plan) 面板">
        <span class="icon">📋</span>
        <span class="name">规划</span>
        <select id="plan-day-select-sidebar" class="sidebar-day-select" title="切换规划日">
          <option value="day1">day1</option>
        </select>
      </li>
      <li class="project-item" data-entity="cut" title="按规划裁剪视频片段">
        <span class="icon">✂</span>
        <span class="name">裁剪</span>
      </li>
      <li class="project-item" data-entity="config" title="编辑 config.yaml 配置">
        <span class="icon">⚙</span>
        <span class="name">设置</span>
      </li>
      <li class="project-item" data-entity="run" title="运行流水线: 压缩→分析→口播→规划→标号">
        <span class="icon">▶</span>
        <span class="name">运行</span>
      </li>
    </ul>
    <h3>视频 <span id="video-count" class="muted"></span></h3>
    <ul id="video-list"></ul>
    <h3>流水线</h3>
    <ul id="step-list" class="step-list"></ul>
  </aside>

  <section id="player-pane">
    <div class="player-wrap">
      <video id="player" controls preload="metadata"></video>
    </div>
    <div id="player-info">
      <span id="player-name">请选择左侧视频</span>
      <span id="player-time">00:00 / 00:00</span>
    </div>
    <div class="player-tip">
      提示: 点右侧 timeline/plan 的 segment 跳到对应时间。Ctrl+S 保存。
    </div>
  </section>

  <aside id="editor">
    <div class="tabs">
      <button class="tab active" data-tab="texts">分析 (texts)</button>
      <button class="tab" data-tab="voiceover">口播 (scripts)</button>
    </div>

    <div id="tab-texts" class="tab-pane active"></div>
    <div id="tab-voiceover" class="tab-pane"></div>
    <div id="tab-plan" class="tab-pane"></div>
    <div id="tab-cut" class="tab-pane"></div>
    <div id="tab-run" class="tab-pane"></div>
    <div id="tab-config" class="tab-pane"></div>

    <div class="editor-actions">
      <button id="btn-save" class="primary">保存</button>
    </div>
  </aside>
</main>

<!-- New Project Modal -->
<div id="modal-new-project" class="modal" style="display:none;">
  <div class="modal-backdrop"></div>
  <div class="modal-dialog">
    <h3>新建项目</h3>
    <label>项目名称 <input id="np-name" type="text" placeholder="如：2025国庆巴黎行"></label>
    <label>素材目录 <input id="np-input-dir" type="text" placeholder="如：E:\Videos\Paris2025"></label>
    <p class="hint">素材目录需包含视频文件（.mp4/.mov/.mkv 等）</p>
    <div class="modal-actions">
      <button id="np-cancel" class="secondary">取消</button>
      <button id="np-create" class="primary">创建并切换</button>
    </div>
  </div>
</div>

<!-- Open Project Modal -->
<div id="modal-open-project" class="modal" style="display:none;">
  <div class="modal-backdrop"></div>
  <div class="modal-dialog">
    <h3>打开项目</h3>
    <div id="project-list-modal">
      <p class="muted">正在加载项目列表...</p>
    </div>
    <div class="modal-actions">
      <button id="op-cancel" class="secondary">取消</button>
    </div>
    <p class="hint" style="margin-top:12px;">选择一个项目后自动切换</p>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Vlog 剪辑 UI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="proj">
    <span class="label">项目:</span>
    <span id="proj-name" class="value">加载中...</span>
  </div>
  <div class="source-toggle">
    <button data-source="compressed" class="active" title="浏览 output/compressed/ 下的 640p 压缩视频">压缩</button>
    <button data-source="original" title="浏览 input_dir 下的原始 4K 视频">原视频</button>
  </div>
  <div class="actions">
    <button id="btn-reload" title="重新扫描磁盘上的文件">重新加载</button>
    <span id="status" class="status"></span>
  </div>
</header>

<main>
  <aside id="sidebar">
    <h3>项目</h3>
    <ul id="project-list">
      <li class="project-item" data-entity="plan" title="打开规划 (plan) 面板">
        <span class="icon">📋</span>
        <span class="name">规划</span>
        <span class="muted">day1</span>
      </li>
      <li class="project-item disabled" data-entity="config" title="待 R-004 实现">
        <span class="icon">⚙</span>
        <span class="name">设置</span>
      </li>
      <li class="project-item disabled" data-entity="run" title="待 R-005 实现">
        <span class="icon">▶</span>
        <span class="name">运行</span>
      </li>
    </ul>
    <h3>视频 <span id="video-count" class="muted"></span></h3>
    <ul id="video-list"></ul>
  </aside>

  <section id="player-pane">
    <div class="player-wrap">
      <video id="player" controls preload="metadata"></video>
    </div>
    <div id="player-info">
      <span id="player-name">请选择左侧视频</span>
      <span id="player-time">00:00 / 00:00</span>
    </div>
    <div class="player-tip">
      提示: 点右侧 timeline/plan 的 segment 跳到对应时间。Ctrl+S 保存。
    </div>
  </section>

  <aside id="editor">
    <div class="tabs">
      <button class="tab active" data-tab="texts">分析 (texts)</button>
      <button class="tab" data-tab="voiceover">口播 (scripts)</button>
    </div>

    <div id="tab-texts" class="tab-pane active"></div>
    <div id="tab-voiceover" class="tab-pane"></div>
    <div id="tab-plan" class="tab-pane"></div>

    <div class="editor-actions">
      <button id="btn-save" class="primary">保存</button>
    </div>
  </aside>
</main>

<script src="/static/app.js"></script>
</body>
</html>

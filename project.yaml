paths:
  input_dir: E:\Videos\Franch2
  output_dir: E:\Videos\Franch2\output
  recursive: false
  ffmpeg: ''
  ffprobe: ''
  logs_dir: logs
ai:
  context_file: ./templates/trip_context.md
  tasks:
    video_analyze:
      provider: gemini
      model: gemini-2.5-flash
    voiceover:
      provider: deepseek
      model: deepseek-v4-flash
    vlog_plan:
      provider: deepseek
      model: deepseek-v4-flash
    refine_text:
      provider: deepseek
      model: deepseek-v4-flash
  context: ''
  debug_print_prompt: false
  provider_ttl_min: 60
compress:
  target_size_mb: 5
  max_width: 640
  split_max_min: 15
  splits_subdir: splits
  reencode_split: false
  fps: 15
  codec: libx264
  crf: 32
  remove_audio: true
analyze:
  compressed_subdir: compressed
  texts_subdir: texts
  skip_existing: true
  max_analyze_duration_min: 30
  max_workers: 1
script:
  scripts_subdir: scripts
  template_file: ./templates/vlog_template.md
  target_words: 80
plan:
  plans_subdir: plans
  max_clips_per_day: 12
  target_duration_sec: 180
  use_transcripts: true
whisper:
  enabled: false
  model_size: medium
  language: zh
  device: auto
  max_segments_per_clip: 5
  transcripts_subdir: transcripts
  cache_dir: null
  hf_endpoint: ''

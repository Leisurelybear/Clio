# Vlog 剪辑辅助工具配置（示例，请复制为 config.yaml 后按需修改）

paths:
  input_dir: "./videos"
  output_dir: "./output"
  recursive: false          # true = 扫描子文件夹内所有视频
  ffmpeg: ""
  ffprobe: ""

proxy:
  enabled: false
  url: "socks5://127.0.0.1:1080"

# AI 厂家与任务配置（每个步骤可独立指定厂家和模型）
ai:
  # 可选：trip 背景 + 规范说明。每次 AI 调用前会自动注入到提示词前面。
  # 用 inline 短文本（context）或者一个文件（context_file）都行，二选一。
  # 适合写：拍摄时间地点、命名约定、避免误判的提示、输出语言等。
  # context: "所有素材均拍摄于 2024 年 7 月法国巴黎，不要误判为其他城市。"
  # context_file: ./templates/trip_context.md

  providers:
    gemini:
      type: gemini
      api_key_env: GEMINI_API_KEY
      poll_interval_sec: 5

    openai:
      type: openai
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1

    deepseek:
      type: openai              # OpenAI 兼容接口
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1

  tasks:
    video_analyze:              # 视频理解（需支持视频的厂家，如 gemini）
      provider: gemini
      model: gemini-2.5-flash

    voiceover:                  # 口播文案（纯文本）
      provider: deepseek
      model: deepseek-chat

    vlog_plan:                  # 日 vlog 剪辑规划（纯文本）
      provider: deepseek
      model: deepseek-chat

    # 可选：refine 阶段（`python main.py refine`）专用 provider。
    # 默认回退：refine_text → video_analyze，refine_script → voiceover。
    # 显式声明后可独立选便宜的纯文本模型（典型场景：全切 deepseek 省钱）。
    # refine_text:
    #   provider: deepseek
    #   model: deepseek-chat
    # refine_script:
    #   provider: deepseek
    #   model: deepseek-chat

compress:
  target_size_mb: 5
  max_width: 640
  fps: 15
  codec: libx264
  crf: 32
  remove_audio: true

analyze:
  compressed_subdir: compressed
  texts_subdir: texts
  skip_existing: true

naming:
  index_width: 3

script:
  scripts_subdir: scripts
  template_file: ./templates/vlog_template.md
  target_words: 80

plan:
  plans_subdir: plans
  max_clips_per_day: 12
  target_duration_sec: 180

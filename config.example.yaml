# Vlog 剪辑辅助工具配置（示例，请复制为 config.yaml 后按需修改）

paths:
  input_dir: "./videos"
  output_dir: "./output"
  recursive: false          # true = 扫描子文件夹内所有视频
  ffmpeg: ""
  ffprobe: ""
  logs_dir: "./logs"        # 按小时切文件：logs/YYYY-MM-DD-HH.log
                            # 整个 CLI 跑下来所有 print() / 错误 / 日志都会同时落这里

proxy:
  enabled: false
  url: "socks5://127.0.0.1:1080"

# AI 厂家与任务配置（每个步骤可独立指定厂家和模型）
#
# API 密钥管理：
#   - 密钥放在项目根目录的 .env 文件中（参考 .env.example），不要写在 config.yaml 里
#   - 每个 provider 的 api_key_env 告诉程序去读取哪个环境变量名
#   - 启动时 .env 会自动加载到环境变量中，密钥只在内存中，不会写回日志
#   - 例如：api_key_env: GEMINI_API_KEY → 读取 .env 里的 GEMINI_API_KEY=xxx
#
# 各厂商 base_url：
#   - Gemini（type: gemini）：不需要写 base_url，SDK 自动使用 Google 官方端
#   - OpenAI 兼容的（type: openai）：必须填 base_url，例如：
#     - OpenAI 官方：https://api.openai.com/v1
#     - DeepSeek：https://api.deepseek.com/v1
#     - 通义千问：https://dashscope.aliyuncs.com/compatible-mode/v1
#     - Kimi：https://api.moonshot.cn/v1
ai:
  # 可选：trip 背景 + 规范说明。每次 AI 调用前会自动注入到提示词前面。
  # 用 inline 短文本（context）或者一个文件（context_file）都行，二选一。
  # 适合写：拍摄时间地点、命名约定、避免误判的提示、输出语言等。
  # context: "所有素材均拍摄于 2024 年 7 月法国巴黎，不要误判为其他城市。"
  # context_file: ./templates/trip_context.md

  # 已缓存的 AI 提供商过期间隔（分钟），超时后自动关闭重建。
  # 长时间运行的 UI 服务建议设 60-120，避免旧 HTTP session 泄漏。
  # 设为 0 表示永不过期。
  # provider_ttl_min: 60

  # debug_print_prompt: true  # 调试用：在每次 AI 调用前打印完整 prompt（含上下文注入）到控制台
  providers:
    gemini:
      type: gemini
      api_key_env: GEMINI_API_KEY
      # base_url: 留空即可，SDK 自动使用 Google 官方 API 地址（https://generativelanguage.googleapis.com）
      poll_interval_sec: 5
      # 免费额度下建议 5-8，付费可降到 3（重试间隔 ~2s 指数退避）
      retry_attempts: 5
      # 每分钟最多调用次数，0 = 不限流
      requests_per_minute: 0

    openai:
      type: openai
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1

    deepseek:
      type: openai              # OpenAI 兼容接口
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1
      # max_tokens: 4096  # 可选：AI 输出最大 token 数（默认 4096，覆盖大部分输出）
  # 
  # ⚠️ 注意：不要在 config.yaml 里写 api_key 字段，密钥请放在 .env 文件中
  #    例如 .env 内容：GEMINI_API_KEY=AIza...  /  DEEPSEEK_API_KEY=sk-...
  #    api_key 字段仅作为 .env 未设置时的后备方案（不推荐）

  # 注意：model 请填写厂商实际支持的模型名。
  # DeepSeek 官网可用：deepseek-chat（V3）、deepseek-reasoner（R1）。
  # 部分三方 API 或自定义网关支持 deepseek-v4-flash 等变体名，请按实际可用名填写。
  tasks:
    video_analyze:              # 视频理解（需支持视频的厂家，如 gemini）
      provider: gemini
      model: gemini-2.5-flash

    voiceover:                  # 口播文案（纯文本）
      provider: deepseek
      model: deepseek-chat

    vlog_plan:                  # 日 vlog 剪辑规划（纯文本）
      provider: deepseek
      model: deepseek-chat

    # 可选：refine 阶段（`python main.py refine`）专用 provider。
    # 默认回退到 video_analyze 的 provider。
    # texts 和 scripts 审阅共用这一个任务（都是纯文本）。
    # 显式声明后可换成更便宜的纯文本模型（典型场景：全切 deepseek 省钱）。
    # refine_text:
    #   provider: deepseek
    #   model: deepseek-chat

compress:
  target_size_mb: 5
  max_width: 640
  fps: 15
  codec: libx264
  crf: 32
  remove_audio: true
  # 自动分段：超过此时长（分钟）的原视频在压缩前先切成等长段
  # 每段独立压缩和分析，避免长视频超出 AI 上下文限制
  # 设为 0 关闭分段；免费额度推荐 15，付费可按需调大
  split_max_min: 15
  splits_subdir: splits
  # reencode_split: true  # 分段时重新编码（-c:v libx264）以精确到帧，
                            # 避免段首黑屏。默认 false 使用 -c copy（快速但
                            # 切分边界在关键帧，段首可能有多余画面或黑帧）。

analyze:
  compressed_subdir: compressed
  texts_subdir: texts
  skip_existing: true
  # 压缩视频超过此时长（分钟）则跳过分析，避免浪费 Gemini 配额
  # 设为 0 表示不限制；免费额度建议 30-45，付费可按需调整
  max_analyze_duration_min: 45
  # AI 分析并发数（ThreadPoolExecutor）。1=串行（默认），>1 并发分析多个视频
  # 注意：并发需要 Gemini 账号有足够的配额（requests_per_minute 也要相应调整）
  max_workers: 1

naming:
  index_width: 3

script:
  scripts_subdir: scripts
  template_file: ./templates/vlog_template.md
  target_words: 80

plan:
  plans_subdir: plans
  max_clips_per_day: 12
  target_duration_sec: 180
#   use_transcripts: true

export:
  canvas_ratio: 16:9      # 16:9 | 9:16 | 1:1 — 剪映导出画布比例
  output_subdir: export

# Whisper ASR 语音转录（需要额外安装 faster-whisper: python main.py whisper install）
# 运行时检测安装，未安装则自动跳过，不会报错
whisper:
  enabled: true        # 默认已启用（运行时检测 faster-whisper 是否安装）
  model_size: medium   # small | medium | large-v3
  language: zh         # zh | en | auto（auto=自动检测语言；per-project 可覆盖）
  device: auto         # auto | cpu | cuda
  max_segments_per_clip: 5   # plan 注入时每段视频最多取 N 条
  cache_dir: null      # null=默认 <程序根目录>/models/；可指定共享目录
  transcripts_subdir: transcripts
  hf_endpoint: https://hf-mirror.com   # 国内推荐 hf-mirror.com，留空=HuggingFace 官方

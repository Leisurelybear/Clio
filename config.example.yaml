# Vlog 剪辑辅助工具全局配置示例（config.yaml）
#
# 从 config_v2 开始，配置拆分为两层：
#   config.yaml  — 全局配置（本文件），仅包含跨项目的通用设置
#   project.yaml — 项目级配置，放在每个项目的目录下
#
# 全局配置项：
#   proxy, server, naming
#   paths: ffmpeg, ffprobe, logs_dir
#   ai: providers, debug_print_prompt, provider_ttl_min
#   compress: fps, codec, crf, remove_audio
#   whisper: cache_dir, hf_endpoint
#
# 项目级配置项（见 project.example.yaml）：
#   paths: input_dir, output_dir, recursive
#   ai: tasks, context, context_file
#   compress: target_size_mb, max_width, split_max_min, splits_subdir, reencode_split
#   analyze, script, plan, export
#   whisper: enabled, model_size, language, device, max_segments_per_clip, transcripts_subdir

proxy:
  enabled: false
  url: "socks5://127.0.0.1:1080"

# AI 厂家配置（全局，密钥管理见下方说明）
#
# API 密钥管理：
#   - 密钥放在项目根目录的 .env 文件中（参考 .env.example），不要写在 config.yaml 里
#   - 每个 provider 的 api_key_env 告诉程序去读取哪个环境变量名
#   - 启动时 .env 会自动加载到环境变量中，密钥只在内存中，不会写回日志
#   - 例如：api_key_env: GEMINI_API_KEY → 读取 .env 里的 GEMINI_API_KEY=xxx
#
# 各厂商 base_url：
#   - Gemini（type: gemini）：不需要写 base_url，SDK 自动使用 Google 官方端
#   - OpenAI 兼容的（type: openai）：必须填 base_url，例如：
#     - OpenAI 官方：https://api.openai.com/v1
#     - DeepSeek：https://api.deepseek.com/v1
#     - 通义千问：https://dashscope.aliyuncs.com/compatible-mode/v1
#     - Kimi：https://api.moonshot.cn/v1
ai:
  # 已缓存的 AI 提供商过期间隔（分钟），超时后自动关闭重建。
  # 长时间运行的 UI 服务建议设 60-120，避免旧 HTTP session 泄漏。
  # 设为 0 表示永不过期。
  # provider_ttl_min: 60

  # debug_print_prompt: true  # 调试用：每次 AI 调用前打印完整 prompt 到控制台（默认开启，可改为 false 关闭）
  providers:
    gemini:
      type: gemini
      api_key_env: GEMINI_API_KEY
      # base_url: 留空即可，SDK 自动使用 Google 官方 API 地址
      poll_interval_sec: 5
      retry_attempts: 5
      requests_per_minute: 0
      models:
        - gemini-2.5-flash
        - gemini-2.5-flash-lite
        - gemini-3-flash
        - gemini-3.1-flash-lite
        - gemini-3.5-flash

    openai:
      type: openai
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1
      models:
        - gpt-4o
        - gpt-4o-mini

    deepseek:
      type: openai              # OpenAI 兼容接口
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1
      models:
        - deepseek-v4-flash
        - deepseek-v4-pro
      # max_tokens: 4096
  #
  # ⚠️ 注意：不要在 config.yaml 里写 api_key 字段，密钥请放在 .env 文件中
  #    例如 .env 内容：GEMINI_API_KEY=AIza...  /  DEEPSEEK_API_KEY=sk-...
  #    api_key 字段仅作为 .env 未设置时的后备方案（不推荐）

paths:
  ffmpeg: ""
  ffprobe: ""
  logs_dir: "./logs"        # 按小时切文件：logs/YYYY-MM-DD-HH.log

compress:
  fps: 15
  codec: libx264
  crf: 32
  remove_audio: true

whisper:
  cache_dir: ""               # 模型缓存目录，为空时使用默认路径 <程序根目录>/models/
  hf_endpoint: https://hf-mirror.com   # 国内推荐 hf-mirror.com，留空=HuggingFace 官方

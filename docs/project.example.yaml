# 项目级配置示例（project.yaml）
#
# 项目级配置覆盖对应项目的个性化设置。与 config.yaml（全局配置）互补，
# 放在 <项目>/project.yaml 中。不存在时使用默认值。
#
# 属于项目级的配置项：
#   paths: output_dir
#   ai: tasks, context, context_file
#   compress: target_size_mb, max_width
#             (split_max_min / splits_subdir / reencode_split are deprecated no-ops)
#   analyze: window_max_min, window_overlap_sec, max_analyze_duration_min, ...
#   script, plan, export
#   whisper: enabled, model_size, language, device, max_segments_per_clip, transcripts_subdir

paths:
  # 注意：原始视频不再通过 input_dir 配置。
  # 请在 Web UI 中打开项目 → "视频管理" → 内嵌文件浏览器勾选。
  output_dir: "./output"

# AI 任务定义（provider 必须在全局 config.yaml 中声明）
ai:
  context: ""               # 项目特定的额外上下文（追加到 trip_context.md 之后）
  # context_file: ./templates/trip_context.md
  tasks:
    video_analyze:
      provider: gemini
      model: gemini-2.5-flash
    voiceover:
      provider: deepseek
      model: deepseek-chat
    vlog_plan:
      provider: deepseek
      model: deepseek-chat

compress:
  target_size_mb: 5
  max_width: 640
  # deprecated — physical split removed; keys ignored on compress
  split_max_min: 15
  splits_subdir: splits
  # reencode_split: true

analyze:
  compressed_subdir: compressed
  texts_subdir: texts
  skip_existing: true
  max_analyze_duration_min: 0   # whole-clip hard cap; 0 = unlimited
  window_max_min: 15            # single Gemini window length (minutes)
  window_overlap_sec: 20        # overlap between windows for boundary dedupe
  max_workers: 1
  # Optional: inject GoPro GPMF / sidecar summary into AI analyze context.
  # Default false. Missing GPS/GPMF is always a silent no-op.
  use_gpmf: false

script:
  scripts_subdir: scripts
  template_file: ./templates/vlog_template.md
  target_words: 80

plan:
  plans_subdir: plans
  max_clips_per_day: 12
  target_duration_sec: 180

export:
  canvas_ratio: 16:9
  output_subdir: export

# Whisper ASR 项目级覆盖
whisper:
  enabled: true
  model_size: medium
  language: zh
  device: auto
  max_segments_per_clip: 5
  transcripts_subdir: transcripts
